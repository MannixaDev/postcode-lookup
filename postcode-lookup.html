<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UK Postcode Emergency Services Lookup</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --police: #1a3a6e;
      --police-bright: #4a90e2;
      --fire: #7a1a0a;
      --fire-bright: #e2502a;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .badge {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .badge.police { background: var(--police); border: 2px solid var(--police-bright); }
    .badge.fire   { background: var(--fire);   border: 2px solid var(--fire-bright);   }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 8vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    h1 span { color: var(--muted); font-size: 0.55em; display: block; letter-spacing: 0.12em; margin-top: 0.3em; }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.8rem;
    }

    .input-zone {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 0.75rem 1rem;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #555; }
    input[type="text"]::placeholder { color: #444; text-transform: none; letter-spacing: 0; }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.1rem;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); }

    .btn-paste {
      background: #2a2a2a;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-paste:hover { background: #333; }

    .btn-lookup {
      background: var(--text);
      color: #000;
    }
    .btn-lookup:hover { opacity: 0.88; }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    .results {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .postcode-header {
      text-align: center;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .postcode-header .pc {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.12em;
    }

    .postcode-header .area {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .service-card {
      border-radius: 10px;
      padding: 1.3rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card.police { background: #0e1a2e; border-color: #1d3a6e; }
    .service-card.fire   { background: #2a0d07; border-color: #6e1a0e; }

    .service-icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .police .service-icon { background: rgba(74,144,226,0.15); }
    .fire   .service-icon { background: rgba(226,80,42,0.15);  }

    .service-info { flex: 1; min-width: 0; }

    .service-label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .police .service-label { color: var(--police-bright); }
    .fire   .service-label { color: var(--fire-bright);   }

    .service-name {
      font-weight: 600;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .extras {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }

    .extra-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .extra-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .extra-value {
      font-weight: 500;
      font-size: 0.95rem;
    }

    .message {
      text-align: center;
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 1.5rem;
      animation: fadeUp 0.3s ease both;
    }
    .message.error { color: #e26060; border-color: #4a1a1a; background: #1a0c0c; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #444;
    }
    footer a { color: #555; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="badge police">🚔</div>
      <div class="badge fire">🚒</div>
    </div>
    <h1>Emergency Services<span>UK Postcode Lookup</span></h1>
    <p class="subtitle">Find your Police force &amp; Fire &amp; Rescue service</p>
  </header>

  <div class="input-zone">
    <div class="input-row">
      <input type="text" id="postcodeInput" placeholder="e.g. SW1A 1AA" maxlength="8" />
      <button class="btn-paste" id="pasteBtn">📋 Paste</button>
      <button class="btn-lookup" id="lookupBtn">Look up</button>
    </div>
    <p class="hint">Paste a postcode from your clipboard, or type one in and press Enter</p>
  </div>

  <div id="output"></div>

  <footer>Data via <a href="https://postcodes.io">postcodes.io</a> · No data is stored or sent anywhere</footer>
</div>

<script>
  const input     = document.getElementById('postcodeInput');
  const pasteBtn  = document.getElementById('pasteBtn');
  const lookupBtn = document.getElementById('lookupBtn');
  const output    = document.getElementById('output');

  // Auto-format postcode spacing
  input.addEventListener('input', () => {
    let val = input.value.replace(/\s+/g, '').toUpperCase();
    if (val.length > 4) val = val.slice(0, val.length - 3) + ' ' + val.slice(val.length - 3);
    input.value = val;
  });

  input.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      // Extract first thing that looks like a postcode
      const match = text.match(/[A-Z]{1,2}\d{1,2}[A-Z]?\s*\d[A-Z]{2}/i);
      input.value = (match ? match[0] : text.trim()).toUpperCase();
      input.dispatchEvent(new Event('input'));
      doLookup();
    } catch {
      showError('Clipboard access was denied by your browser. Please paste manually with Ctrl+V / Cmd+V.');
    }
  });

  lookupBtn.addEventListener('click', doLookup);

  async function doLookup() {
    const raw = input.value.replace(/\s/g, '').toUpperCase();
    if (!raw) { showError('Please enter or paste a UK postcode.'); return; }

    showLoading();
    try {
      const res  = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(raw)}`);
      const data = await res.json();
      if (data.status !== 200) { showError('Postcode not found. Double-check it and try again.'); return; }
      renderResults(data.result);
    } catch {
      showError('Could not reach the postcode service. Please check your internet connection.');
    }
  }

  function showLoading() {
    output.innerHTML = `<div class="message"><span class="spinner"></span>Looking up postcode…</div>`;
  }

  function showError(msg) {
    output.innerHTML = `<div class="message error">⚠️ ${msg}</div>`;
  }

  function renderResults(d) {
    const police      = d.pfa || 'Not available';
    const fireService = getFireService(d);
    const postcode    = d.postcode;
    const county      = d.admin_county || d.admin_district || '';
    const region      = d.region || d.european_electoral_region || '';
    const country     = d.country || '';

    output.innerHTML = `
      <div class="results">
        <div class="postcode-header">
          <div class="pc">${postcode}</div>
          <div class="area">${[county, region, country].filter(Boolean).join(' · ')}</div>
        </div>

        <div class="service-card police">
          <div class="service-icon">🚔</div>
          <div class="service-info">
            <div class="service-label">Police Force</div>
            <div class="service-name">${police}</div>
          </div>
        </div>

        <div class="service-card fire">
          <div class="service-icon">🚒</div>
          <div class="service-info">
            <div class="service-label">Fire &amp; Rescue Service</div>
            <div class="service-name">${fireService}</div>
          </div>
        </div>

        <div class="extras">
          <div class="extra-card">
            <div class="extra-label">District</div>
            <div class="extra-value">${d.admin_district || '—'}</div>
          </div>
          <div class="extra-card">
            <div class="extra-label">Ward</div>
            <div class="extra-value">${d.admin_ward || '—'}</div>
          </div>
          <div class="extra-card">
            <div class="extra-label">Country</div>
            <div class="extra-value">${d.country || '—'}</div>
          </div>
          <div class="extra-card">
            <div class="extra-label">Region</div>
            <div class="extra-value">${d.region || d.european_electoral_region || '—'}</div>
          </div>
        </div>
      </div>`;
  }

  // Derive fire service from police force area / country / county
  // postcodes.io doesn't expose a fire authority field directly
  function getFireService(d) {
    const country  = (d.country || '').toLowerCase();
    const pfa      = (d.pfa || '').toLowerCase();
    const county   = (d.admin_county || '').toLowerCase();
    const district = (d.admin_district || '').toLowerCase();

    if (country.includes('scotland'))         return 'Scottish Fire and Rescue Service';
    if (country.includes('northern ireland')) return 'Northern Ireland Fire & Rescue Service';

    // Wales
    if (country.includes('wales')) {
      if (pfa.includes('north'))  return 'North Wales Fire and Rescue Service';
      if (pfa.includes('dyfed') || pfa.includes('gwent') || pfa.includes('south wales'))
        return 'Mid and West Wales / South Wales Fire and Rescue';
      return 'Wales Fire and Rescue Service';
    }

    // England – map by PFA name
    const map = [
      ['avon and somerset',    'Avon Fire & Rescue Service'],
      ['bedfordshire',         'Bedfordshire Fire and Rescue Service'],
      ['cambridgeshire',       'Cambridgeshire Fire and Rescue Service'],
      ['cheshire',             'Cheshire Fire & Rescue Service'],
      ['city of london',       'London Fire Brigade'],
      ['cleveland',            'Cleveland Fire Brigade'],
      ['cumbria',              'Cumbria Fire & Rescue Service'],
      ['derbyshire',           'Derbyshire Fire & Rescue Service'],
      ['devon and cornwall',   'Devon & Somerset Fire and Rescue Service'],
      ['dorset',               'Dorset & Wiltshire Fire and Rescue Service'],
      ['durham',               'County Durham and Darlington Fire and Rescue Service'],
      ['essex',                'Essex County Fire & Rescue Service'],
      ['gloucestershire',      'Gloucestershire Fire and Rescue Service'],
      ['greater manchester',   'Greater Manchester Fire and Rescue Service'],
      ['hampshire',            'Hampshire & Isle of Wight Fire and Rescue Service'],
      ['hertfordshire',        'Hertfordshire Fire and Rescue Service'],
      ['humberside',           'Humberside Fire and Rescue Service'],
      ['kent',                 'Kent Fire and Rescue Service'],
      ['lancashire',           'Lancashire Fire & Rescue Service'],
      ['leicestershire',       'Leicestershire Fire and Rescue Service'],
      ['lincolnshire',         'Lincolnshire Fire & Rescue Service'],
      ['merseyside',           'Merseyside Fire & Rescue Service'],
      ['metropolitan police',  'London Fire Brigade'],
      ['norfolk',              'Norfolk Fire and Rescue Service'],
      ['north yorkshire',      'North Yorkshire Fire & Rescue Service'],
      ['northamptonshire',     'Northamptonshire Fire and Rescue Service'],
      ['northumbria',          'Tyne and Wear Fire and Rescue Service'],
      ['nottinghamshire',      'Nottinghamshire Fire and Rescue Service'],
      ['south yorkshire',      'South Yorkshire Fire & Rescue Service'],
      ['staffordshire',        'Staffordshire Fire and Rescue Service'],
      ['suffolk',              'Suffolk Fire and Rescue Service'],
      ['surrey',               'Surrey Fire and Rescue Service'],
      ['sussex',               'East Sussex & West Sussex Fire and Rescue Service'],
      ['thames valley',        'Oxfordshire / Berkshire / Buckinghamshire Fire & Rescue'],
      ['warwickshire',         'Warwickshire Fire and Rescue Service'],
      ['west mercia',          'Hereford & Worcester / Shropshire Fire and Rescue'],
      ['west midlands',        'West Midlands Fire Service'],
      ['west yorkshire',       'West Yorkshire Fire and Rescue Service'],
      ['wiltshire',            'Dorset & Wiltshire Fire and Rescue Service'],
    ];

    for (const [key, val] of map) {
      if (pfa.includes(key) || county.includes(key) || district.includes(key)) return val;
    }

    if (pfa) return pfa.replace(/police/gi, '').trim() + ' Fire and Rescue Service';
    return 'Check your local Fire and Rescue Service';
  }
</script>
</body>
</html>
